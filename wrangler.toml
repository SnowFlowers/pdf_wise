# pdf_wise — Cloudflare Wrangler
# 文档：https://developers.cloudflare.com/workers/wrangler/configuration/

name = "pdfwise"
compatibility_date = "2025-03-21"

# Next / Node 兼容 API 时常需要（按你实际 adapter 决定是否保留）
compatibility_flags = ["nodejs_compat"]

# --- Cloudflare Pages：构建产物目录（按部署方式取消注释其一）---
# @cloudflare/next-on-pages 常见输出：
# pages_build_output_dir = ".vercel/output/static"
# OpenNext @opennextjs/cloudflare 请以其文档为准，例如：
# pages_build_output_dir = ".open-next"

# 若仅静态导出 `next export` / `out`：
# pages_build_output_dir = "out"

# 可选：绑定自定义域名时在 Dashboard 配置，或在此处扩展 [env]
# [vars]
# EXAMPLE = "value"
